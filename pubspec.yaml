name: munzur_mobil
description: Munzur Mobil - Kampüs Cebinde
publish_to: 'none'

version: 1.0.0+3

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  flutter_riverpod: ^3.0.3
  go_router: ^16.2.4
  url_launcher: ^6.3.1
  http: ^1.2.2
  xml: ^6.5.0
  html: ^0.15.5
  webview_flutter: ^4.7.0
  intl: ^0.19.0
  charset: ^2.0.1
  font_awesome_flutter: ^10.7.0
  shared_preferences: ^2.5.3


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.6
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/splash_logo.png
  android: true
  ios: true
  web: false

flutter_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/app_icon.png